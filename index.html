<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎋 タケノビファミリー カレンダー＆習い事マネージャー</title>
<style>
:root{
  --bg:#FAF8F3;
  --panel:#FFFFFF;
  --border:#E5E0D5;
  --text:#3D3A36;
  --text-dim:#7A7670;
  --kotaro:#2E7D32;
  --kotaro-bg:#E8F5E9;
  --yuna:#7B2D9D;
  --yuna-bg:#F3E5F5;
  --nanami:#E91E63;
  --nanami-bg:#FCE4EC;
  --holiday:#D32F2F;
  --holiday-bg:#FFEBEE;
  --gold:#C8A84E;
  --accent:#5D4E37;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;}
.container{max-width:1200px;margin:0 auto;padding:16px;}
.header{background:linear-gradient(135deg,#5D4E37 0%,#8B7355 100%);color:#fff;padding:16px 20px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px;}
.header .sub{font-size:12px;opacity:0.85;margin-top:4px;}
.kids-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.kid-chip{background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);transition:all 0.2s;}
.kid-chip.off{opacity:0.4;}
.kid-chip.kotaro::before{content:'';width:8px;height:8px;border-radius:50%;background:#7BC67E;}
.kid-chip.yuna::before{content:'';width:8px;height:8px;border-radius:50%;background:#CE93D8;}
.kid-chip.nanami::before{content:'';width:8px;height:8px;border-radius:50%;background:#F8BBD0;}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--panel);padding:6px;border-radius:10px;border:1px solid var(--border);overflow-x:auto;}
.tab{padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-dim);white-space:nowrap;border:none;background:none;transition:all 0.2s;}
.tab.active{background:var(--accent);color:#fff;}
.tab:hover:not(.active){background:#F5F1E8;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
.panel-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--accent);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;}
.cal-nav button{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
.cal-nav button:hover{background:#7A6850;}
.cal-month{font-size:18px;font-weight:700;flex:1;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.cal-head{background:#5D4E37;color:#fff;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;}
.cal-head.sun{background:#8B3A3A;}
.cal-head.sat{background:#3A5A8B;}
.cal-cell{background:#fff;min-height:88px;padding:4px;font-size:11px;position:relative;cursor:pointer;}
.cal-cell:hover{background:#F9F7F1;}
.cal-cell.empty{background:#F5F1E8;cursor:default;}
.cal-cell.today{background:#FFF8E1;border:2px solid var(--gold);}
.cal-cell.sun .day-num{color:#C62828;}
.cal-cell.sat .day-num{color:#1565C0;}
.cal-cell.holiday{background:var(--holiday-bg);}
.cal-cell.holiday .day-num{color:var(--holiday);font-weight:700;}
.day-num{font-weight:700;font-size:13px;margin-bottom:2px;}
.ev{display:block;font-size:10px;padding:2px 4px;margin-bottom:1px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;}
.ev.kotaro{background:var(--kotaro-bg);color:var(--kotaro);border-left:2px solid var(--kotaro);}
.ev.yuna{background:var(--yuna-bg);color:var(--yuna);border-left:2px solid var(--yuna);}
.ev.nanami{background:var(--nanami-bg);color:var(--nanami);border-left:2px solid var(--nanami);}
.ev.holiday{background:var(--holiday-bg);color:var(--holiday);border-left:2px solid var(--holiday);}
.ev.lesson{background:#FFF3E0;color:#E65100;border-left:2px solid #E65100;}
.ev-more{font-size:9px;color:var(--text-dim);font-weight:600;}
/* Day detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:14px;color:var(--accent);display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-dim);}
.modal-ev-item{padding:10px;margin-bottom:8px;border-radius:6px;font-size:13px;}
.modal-ev-item.kotaro{background:var(--kotaro-bg);border-left:3px solid var(--kotaro);}
.modal-ev-item.yuna{background:var(--yuna-bg);border-left:3px solid var(--yuna);}
.modal-ev-item.nanami{background:var(--nanami-bg);border-left:3px solid var(--nanami);}
.modal-ev-item.holiday{background:var(--holiday-bg);border-left:3px solid var(--holiday);}
.modal-ev-item.lesson{background:#FFF3E0;border-left:3px solid #E65100;}
.modal-ev-item .who{font-size:11px;font-weight:700;display:inline-block;margin-right:6px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.6);}
/* Lesson fees */
.kid-section{margin-bottom:24px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.kid-header{padding:12px 16px;font-weight:700;font-size:15px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.kid-header.kotaro{background:var(--kotaro);}
.kid-header.yuna{background:var(--yuna);}
.kid-header.nanami{background:var(--nanami);}
.kid-body{padding:14px;background:#FDFCF9;}
.lesson-table{width:100%;border-collapse:collapse;font-size:13px;}
.lesson-table th{background:#F0EBE0;padding:8px;text-align:left;font-size:12px;font-weight:600;color:var(--text-dim);}
.lesson-table td{padding:8px;border-bottom:1px solid var(--border);}
.lesson-table tr:last-child td{border-bottom:none;}
.lesson-table input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:#fff;}
.lesson-table input:focus{border-color:var(--gold);outline:none;}
.lesson-table input.fee{text-align:right;}
.lesson-actions{display:flex;gap:8px;margin-top:10px;}
.btn{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#7A6850;}
.btn-secondary{background:#E0DAC8;color:var(--accent);}
.btn-secondary:hover{background:#D0C9B5;}
.btn-danger{background:none;color:var(--holiday);border:1px solid var(--holiday);padding:4px 10px;font-size:12px;}
.btn-danger:hover{background:var(--holiday-bg);}
.btn-add{background:#fff;color:var(--accent);border:2px dashed var(--border);width:100%;padding:10px;margin-top:10px;}
.btn-add:hover{border-color:var(--gold);background:#FFFBEF;}
.kid-total{font-size:14px;font-weight:700;color:var(--accent);}
.summary-card{background:linear-gradient(135deg,#FFF8E1 0%,#FFEFD5 100%);padding:18px;border-radius:12px;border:2px solid var(--gold);margin-bottom:20px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed rgba(200,168,78,0.3);font-size:14px;}
.summary-row:last-child{border-bottom:none;font-size:18px;font-weight:700;padding-top:12px;color:var(--accent);}
.summary-row .amount{font-family:'Hiragino Sans',sans-serif;font-weight:700;}
.summary-row .amount.kotaro{color:var(--kotaro);}
.summary-row .amount.yuna{color:var(--yuna);}
.summary-row .amount.nanami{color:var(--nanami);}
/* Question form */
.q-form{background:#FAFAFA;padding:14px;border-radius:8px;margin-bottom:16px;}
.q-form-row{display:grid;grid-template-columns:120px 1fr;gap:10px;margin-bottom:10px;align-items:center;}
.q-form-row label{font-size:13px;font-weight:600;color:var(--text-dim);}
.q-form-row select,.q-form-row input,.q-form-row textarea{padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:100%;font-family:inherit;}
.q-form-row textarea{min-height:80px;resize:vertical;}
.q-form-row select:focus,.q-form-row input:focus,.q-form-row textarea:focus{border-color:var(--gold);outline:none;}
.q-list-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.q-list-item.resolved{opacity:0.6;background:#F5F5F5;}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.q-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.q-tag.kotaro{background:var(--kotaro-bg);color:var(--kotaro);}
.q-tag.yuna{background:var(--yuna-bg);color:var(--yuna);}
.q-tag.nanami{background:var(--nanami-bg);color:var(--nanami);}
.q-tag.subject{background:#EEEAE0;color:var(--accent);}
.q-date{font-size:11px;color:var(--text-dim);margin-left:auto;}
.q-text{font-size:14px;line-height:1.6;white-space:pre-wrap;color:var(--text);}
.q-actions{display:flex;gap:6px;margin-top:8px;}
.q-actions button{font-size:11px;padding:4px 10px;}
.q-resolved-mark{color:var(--kotaro);font-weight:700;font-size:11px;}
.empty-msg{text-align:center;color:var(--text-dim);font-size:13px;padding:20px;font-style:italic;}
/* Settings */
.kid-edit-card{padding:14px;border-radius:10px;margin-bottom:14px;}
.kid-edit-card.kotaro{background:var(--kotaro-bg);}
.kid-edit-card.yuna{background:var(--yuna-bg);}
.kid-edit-card.nanami{background:var(--nanami-bg);}
.kid-edit-row{display:grid;grid-template-columns:90px 1fr;gap:10px;margin-bottom:8px;align-items:center;font-size:13px;}
.kid-edit-row input{padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px;}
@media(max-width:640px){
  .container{padding:8px;}
  .cal-cell{min-height:60px;}
  .ev{font-size:9px;padding:1px 3px;}
  .day-num{font-size:11px;}
  .q-form-row{grid-template-columns:1fr;}
  .kid-edit-row{grid-template-columns:1fr;}
  .lesson-table{font-size:11px;}
  .lesson-table th,.lesson-table td{padding:5px 4px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎋 タケノビファミリー カレンダー</h1>
    <div class="sub">航太朗・優奈・菜々美 統合スケジュール ＆ 習い事マネージャー</div>
    <div class="kids-row">
      <div class="kid-chip kotaro" data-kid="kotaro" onclick="toggleKid('kotaro')">航太朗（星林高1）</div>
      <div class="kid-chip yuna" data-kid="yuna" onclick="toggleKid('yuna')">優奈（貴志中2）</div>
      <div class="kid-chip nanami" data-kid="nanami" onclick="toggleKid('nanami')">菜々美（小1）</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('cal',this)">📅 カレンダー</button>
    <button class="tab" onclick="switchTab('fee',this)">💰 習い事代</button>
    <button class="tab" onclick="switchTab('q',this)">❓ 質問用紙</button>
    <button class="tab" onclick="switchTab('set',this)">⚙️ 設定</button>
  </div>

  <!-- Calendar tab -->
  <div id="tab-cal" class="tab-content">
    <div class="panel">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">◀ 前月</button>
        <div class="cal-month" id="calMonth"></div>
        <button onclick="changeMonth(1)">次月 ▶</button>
        <button onclick="goToday()" style="background:var(--gold);">今日</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div style="margin-top:14px;font-size:11px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:12px;">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--kotaro);border-radius:2px;"></span> 航太朗</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--yuna);border-radius:2px;"></span> 優奈</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--nanami);border-radius:2px;"></span> 菜々美</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#E65100;border-radius:2px;"></span> 習い事</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--holiday);border-radius:2px;"></span> 祝日</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📝 予定を追加</div>
      <div class="q-form-row">
        <label>誰</label>
        <select id="addEvKid">
          <option value="kotaro">航太朗</option>
          <option value="yuna">優奈</option>
          <option value="nanami">菜々美</option>
        </select>
      </div>
      <div class="q-form-row">
        <label>日付</label>
        <input type="date" id="addEvDate">
      </div>
      <div class="q-form-row">
        <label>予定</label>
        <input type="text" id="addEvTitle" placeholder="例：歯医者・誕生日・参観日など">
      </div>
      <button class="btn btn-primary" onclick="addCustomEvent()">予定を追加</button>
    </div>
  </div>

  <!-- Lesson fees tab -->
  <div id="tab-fee" class="tab-content" style="display:none;">
    <div class="summary-card">
      <div class="summary-row"><span>航太朗 月額</span><span class="amount kotaro" id="totalKotaro">¥0</span></div>
      <div class="summary-row"><span>優奈 月額</span><span class="amount yuna" id="totalYuna">¥0</span></div>
      <div class="summary-row"><span>菜々美 月額</span><span class="amount nanami" id="totalNanami">¥0</span></div>
      <div class="summary-row"><span>👨‍👩‍👧‍👦 ファミリー合計（月額）</span><span class="amount" id="totalAll">¥0</span></div>
      <div class="summary-row" style="font-size:14px;font-weight:600;border-top:1px dashed rgba(200,168,78,0.3);padding-top:10px;margin-top:6px;color:var(--text-dim);"><span>年額換算</span><span class="amount" id="totalYear">¥0</span></div>
    </div>

    <div id="lessonsContainer"></div>
  </div>

  <!-- Question form tab -->
  <div id="tab-q" class="tab-content" style="display:none;">
    <div class="panel">
      <div class="panel-title">❓ わからないところを書く</div>
      <div class="q-form">
        <div class="q-form-row">
          <label>誰の質問</label>
          <select id="qKid">
            <option value="kotaro">航太朗</option>
            <option value="yuna">優奈</option>
            <option value="nanami">菜々美</option>
          </select>
        </div>
        <div class="q-form-row">
          <label>科目・分類</label>
          <select id="qSubject">
            <option value="国語">国語</option>
            <option value="数学・算数">数学・算数</option>
            <option value="英語">英語</option>
            <option value="理科">理科</option>
            <option value="社会">社会</option>
            <option value="音楽">音楽</option>
            <option value="美術・図工">美術・図工</option>
            <option value="体育">体育</option>
            <option value="習い事">習い事</option>
            <option value="生活">生活</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="q-form-row">
          <label>質問内容</label>
          <textarea id="qText" placeholder="わからないところ、聞きたいことを書いてね"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addQuestion()">質問を保存</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 質問リスト</div>
      <div style="margin-bottom:12px;font-size:12px;">
        <button class="btn btn-secondary" onclick="filterQ('all',this)" id="qFilterAll">すべて</button>
        <button class="btn btn-secondary" onclick="filterQ('kotaro',this)">航太朗</button>
        <button class="btn btn-secondary" onclick="filterQ('yuna',this)">優奈</button>
        <button class="btn btn-secondary" onclick="filterQ('nanami',this)">菜々美</button>
        <button class="btn btn-secondary" onclick="filterQ('pending',this)">未解決のみ</button>
      </div>
      <div id="qList"></div>
    </div>
  </div>

  <!-- Settings tab -->
  <div id="tab-set" class="tab-content" style="display:none;">
    <div class="panel">
      <div class="panel-title">👨‍👩‍👧‍👦 子供の情報</div>
      <div class="kid-edit-card kotaro">
        <div style="font-weight:700;margin-bottom:10px;color:var(--kotaro);">🟢 航太朗</div>
        <div class="kid-edit-row"><label>名前</label><input type="text" id="setKotaroName" value="航太朗"></div>
        <div class="kid-edit-row"><label>学校</label><input type="text" id="setKotaroSchool" value="星林高校"></div>
        <div class="kid-edit-row"><label>学年</label><input type="text" id="setKotaroGrade" value="高校1年生"></div>
      </div>
      <div class="kid-edit-card yuna">
        <div style="font-weight:700;margin-bottom:10px;color:var(--yuna);">🟣 優奈</div>
        <div class="kid-edit-row"><label>名前</label><input type="text" id="setYunaName" value="優奈"></div>
        <div class="kid-edit-row"><label>学校</label><input type="text" id="setYunaSchool" value="貴志中学校"></div>
        <div class="kid-edit-row"><label>学年</label><input type="text" id="setYunaGrade" value="中学2年生"></div>
      </div>
      <div class="kid-edit-card nanami">
        <div style="font-weight:700;margin-bottom:10px;color:var(--nanami);">🌸 菜々美</div>
        <div class="kid-edit-row"><label>名前</label><input type="text" id="setNanamiName" value="菜々美"></div>
        <div class="kid-edit-row"><label>学校</label><input type="text" id="setNanamiSchool" value="小学校"></div>
        <div class="kid-edit-row"><label>学年</label><input type="text" id="setNanamiGrade" value="小学1年生"></div>
      </div>
      <button class="btn btn-primary" onclick="saveKidInfo()">情報を保存</button>
    </div>

    <div class="panel">
      <div class="panel-title">💾 データ管理</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">習い事・予定・質問データはこの端末（ブラウザ）に保存されています。</div>
      <button class="btn btn-secondary" onclick="exportData()">📤 バックアップを書き出し</button>
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 バックアップを読み込み</button>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
      <button class="btn btn-danger" style="margin-top:10px;" onclick="resetAllData()">🗑️ すべてのデータをリセット</button>
    </div>
  </div>
</div>

<!-- Day detail modal -->
<div class="modal-overlay" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal" onclick="event.stopPropagation();">
    <div class="modal-title">
      <span id="modalDate"></span>
      <button class="modal-close" onclick="closeDayModal()">&times;</button>
    </div>
    <div id="modalContent"></div>
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="addEventForModalDay()">＋この日に予定を追加</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 星林高校 R8年度 行事予定（航太朗）
// ============================================================
const KOTARO_EVENTS=[
  {d:'2026-04-08',t:'始業式'},{d:'2026-04-09',t:'入学式'},{d:'2026-04-10',t:'新入生歓迎会'},
  {d:'2026-04-11',t:'4月総合学力記述模試(3年)'},{d:'2026-04-13',t:'宿題考査①'},{d:'2026-04-14',t:'宿題考査②'},

// ============================================================
// Calendar
// ============================================================
function pad(n){return String(n).padStart(2,'0');}
function fmtDate(y,m,d){return `${y}-${pad(m)}-${pad(d)}`;}

function getEventsForDate(dateStr){
  const evs=[];
  if(state.visibleKids.kotaro){
    KOTARO_EVENTS.filter(e=>e.d===dateStr).forEach(e=>evs.push({kid:'kotaro',title:e.t,holiday:e.h===1}));
  }
  if(state.visibleKids.yuna){
    YUNA_EVENTS.filter(e=>e.d===dateStr).forEach(e=>evs.push({kid:'yuna',title:e.t,holiday:e.h===1}));
  }
  if(state.visibleKids.nanami){
    NANAMI_EVENTS.filter(e=>e.d===dateStr).forEach(e=>evs.push({kid:'nanami',title:e.t,holiday:e.h===1}));
  }
  state.customEvents.filter(e=>e.date===dateStr&&state.visibleKids[e.kid]).forEach(e=>{
    evs.push({kid:e.kid,title:e.title,custom:true,id:e.id});
  });
  // Lessons for the day-of-week
  const dt=new Date(dateStr);
  const dow=dt.getDay();
  const dowLabels=['日','月','火','水','木','金','土'];
  ['kotaro','yuna','nanami'].forEach(kid=>{
    if(!state.visibleKids[kid])return;
    state.lessons[kid].forEach(l=>{
      if(!l.name)return;
      if(l.freq==='monthly')return; // 月1回などは自動表示せず手動で予定追加
      const days=(l.day||'').split(/[、,・/]/).map(s=>s.trim()).filter(Boolean);
      if(days.includes(dowLabels[dow])){
        evs.push({kid:kid,title:`🎯 ${l.name}${l.time?' '+l.time:''}`,lesson:true});
      }
    });
  });
  return evs;
}

function renderCalendar(){
  const y=state.currentMonth.getFullYear();
  const m=state.currentMonth.getMonth()+1;
  document.getElementById('calMonth').textContent=`${y}年 ${m}月`;
  const first=new Date(y,m-1,1);
  const last=new Date(y,m,0);
  const startDow=first.getDay();
  const daysInMonth=last.getDate();
  const today=new Date();
  let html='';
  ['日','月','火','水','木','金','土'].forEach((d,i)=>{
    const cls=i===0?'sun':i===6?'sat':'';
    html+=`<div class="cal-head ${cls}">${d}</div>`;
  });
  for(let i=0;i<startDow;i++)html+='<div class="cal-cell empty"></div>';
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=fmtDate(y,m,day);
    const dow=new Date(y,m-1,day).getDay();
    const isToday=today.getFullYear()===y&&today.getMonth()+1===m&&today.getDate()===day;
    const evs=getEventsForDate(dateStr);
    const hasHoliday=evs.some(e=>e.holiday);
    let cls='cal-cell';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(isToday)cls+=' today';
    if(hasHoliday)cls+=' holiday';
    let evHtml='';
    const maxShow=3;
    evs.slice(0,maxShow).forEach(e=>{
      let evCls=e.kid;
      if(e.holiday)evCls='holiday';
      else if(e.lesson)evCls='lesson';
      evHtml+=`<span class="ev ${evCls}" title="${e.title}">${e.title}</span>`;
    });
    if(evs.length>maxShow){
      evHtml+=`<span class="ev-more">＋${evs.length-maxShow}件</span>`;
    }
    html+=`<div class="${cls}" onclick="openDayModal('${dateStr}')"><div class="day-num">${day}</div>${evHtml}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function changeMonth(d){
  state.currentMonth.setMonth(state.currentMonth.getMonth()+d);
  renderCalendar();
}
function goToday(){state.currentMonth=new Date();renderCalendar();}

function toggleKid(kid){
  state.visibleKids[kid]=!state.visibleKids[kid];
  document.querySelectorAll('.kid-chip').forEach(c=>{
    if(c.dataset.kid)c.classList.toggle('off',!state.visibleKids[c.dataset.kid]);
  });
  saveState();
  renderCalendar();
}

  NANAMI_EVENTS.filter(e=>e.d===dateStr).forEach(e=>evs.push({kid:'nanami',title:e.t,holiday:e.h===1}));
  state.customEvents.filter(e=>e.date===dateStr).forEach(e=>{
    evs.push({kid:e.kid,title:e.title,custom:true,id:e.id});
  });
  const dt=new Date(dateStr);
  const dow=dt.getDay();
  const dowLabels=['日','月','火','水','木','金','土'];
  ['kotaro','yuna','nanami'].forEach(kid=>{
    state.lessons[kid].forEach(l=>{
      if(!l.name)return;
      if(l.freq==='monthly')return;
      const days=(l.day||'').split(/[、,・/]/).map(s=>s.trim()).filter(Boolean);

        evs.push({kid:kid,title:`🎯 ${l.name}${l.time?' '+l.time:''}`,lesson:true});

      let cls=e.kid;
      if(e.holiday)cls='holiday';
      else if(e.lesson)cls='lesson';
      const removeBtn=e.custom?`<button class="btn btn-danger" style="float:right;" onclick="removeCustomEvent('${e.id}')">削除</button>`:'';
      html+=`<div class="modal-ev-item ${cls}"><span class="who">${KID_LABELS[e.kid]||''}</span>${e.title}${removeBtn}</div>`;
    });
  }
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('dayModal').classList.add('show');
}
function closeDayModal(e){
  if(e&&e.target!==e.currentTarget)return;
  document.getElementById('dayModal').classList.remove('show');
  state.modalDate=null;
}
function addEventForModalDay(){
  if(!state.modalDate)return;
  document.getElementById('addEvDate').value=state.modalDate;
  closeDayModal();
  document.getElementById('addEvTitle').focus();
}

function addCustomEvent(){
  const kid=document.getElementById('addEvKid').value;
  const date=document.getElementById('addEvDate').value;
  const title=document.getElementById('addEvTitle').value.trim();
  if(!date||!title){alert('日付と予定を入力してください');return;}
  state.customEvents.push({id:'c'+Date.now(),kid:kid,date:date,title:title});
  saveState();
  renderCalendar();
  document.getElementById('addEvTitle').value='';
  alert('予定を追加しました');
}
function removeCustomEvent(id){
  if(!confirm('この予定を削除しますか？'))return;
  state.customEvents=state.customEvents.filter(e=>e.id!==id);
  saveState();
  renderCalendar();
  if(state.modalDate)openDayModal(state.modalDate);
}

// ============================================================
// Lessons / fees
// ============================================================
function renderLessons(){
  const c=document.getElementById('lessonsContainer');
  let html='';
  ['kotaro','yuna','nanami'].forEach(kid=>{
    const lessons=state.lessons[kid];
    let total=0;
    lessons.forEach(l=>{total+=parseInt(l.fee)||0;});
    html+=`<div class="kid-section">
      <div class="kid-header ${kid}">
        <span>${kid==='kotaro'?'🟢':kid==='yuna'?'🟣':'🌸'} ${state.kidInfo[kid].name}</span>
        <span class="kid-total" style="color:#fff;">月額 ¥${total.toLocaleString()}</span>
      </div>
      <div class="kid-body">
        <table class="lesson-table">
          <thead><tr><th style="width:26%;">習い事</th><th style="width:18%;">曜日</th><th style="width:14%;">頻度</th><th style="width:16%;">時間</th><th style="width:18%;">月額(円)</th><th style="width:8%;"></th></tr></thead>
          <tbody>`;
    if(lessons.length===0){
      html+=`<tr><td colspan="6" class="empty-msg" style="padding:14px;">習い事を追加してください</td></tr>`;
    }else{
      lessons.forEach((l,i)=>{
        html+=`<tr>
          <td><input type="text" value="${escapeHtml(l.name||'')}" placeholder="例：そろばん" oninput="updateLesson('${kid}',${i},'name',this.value)"></td>
          <td><input type="text" value="${escapeHtml(l.day||'')}" placeholder="月・水" oninput="updateLesson('${kid}',${i},'day',this.value)" title="複数の曜日は「月・水」「火,金」のように入力"></td>
          <td><select onchange="updateLesson('${kid}',${i},'freq',this.value)">
            <option value="weekly" ${(l.freq||'weekly')==='weekly'?'selected':''}>毎週</option>
            <option value="monthly" ${l.freq==='monthly'?'selected':''}>月1回</option>
          </select></td>
          <td><input type="text" value="${escapeHtml(l.time||'')}" placeholder="17:00-18:00" oninput="updateLesson('${kid}',${i},'time',this.value)"></td>
          <td><input type="number" class="fee" value="${l.fee||''}" placeholder="0" oninput="updateLesson('${kid}',${i},'fee',this.value)"></td>
          <td><button class="btn btn-danger" onclick="removeLesson('${kid}',${i})">削除</button></td>
        </tr>`;
      });
    }
    html+=`</tbody></table>
        <button class="btn btn-add" onclick="addLesson('${kid}')">＋ ${state.kidInfo[kid].name}の習い事を追加</button>
      </div>
    </div>`;
  });
  c.innerHTML=html;
  updateTotals();
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function addLesson(kid){
  state.lessons[kid].push({name:'',day:'',time:'',fee:''});
  saveState();
  renderLessons();
}
function updateLesson(kid,i,field,val){
  state.lessons[kid][i][field]=val;
  saveState();
  if(field==='fee'||field==='name'){
    updateTotals();
    if(field==='name'){
      // Just update totals; name doesn't need re-render
    }
  }
}
function removeLesson(kid,i){
  if(!confirm('この習い事を削除しますか？'))return;
  state.lessons[kid].splice(i,1);
  saveState();
  renderLessons();
}
function updateTotals(){
  const totals={kotaro:0,yuna:0,nanami:0};
  ['kotaro','yuna','nanami'].forEach(kid=>{
    state.lessons[kid].forEach(l=>{totals[kid]+=parseInt(l.fee)||0;});
  });
  document.getElementById('totalKotaro').textContent='¥'+totals.kotaro.toLocaleString();
  document.getElementById('totalYuna').textContent='¥'+totals.yuna.toLocaleString();
  document.getElementById('totalNanami').textContent='¥'+totals.nanami.toLocaleString();
  const all=totals.kotaro+totals.yuna+totals.nanami;
  document.getElementById('totalAll').textContent='¥'+all.toLocaleString();
  document.getElementById('totalYear').textContent='¥'+(all*12).toLocaleString();
  // Update kid-total spans
  document.querySelectorAll('.kid-section').forEach(sec=>{
    const header=sec.querySelector('.kid-header');
    if(header){
      const cls=header.classList.contains('kotaro')?'kotaro':header.classList.contains('yuna')?'yuna':'nanami';
      const spanTotal=header.querySelector('.kid-total');
      if(spanTotal)spanTotal.textContent='月額 ¥'+totals[cls].toLocaleString();
    }
  });
}

// ============================================================
// Questions
// ============================================================
function addQuestion(){
  const kid=document.getElementById('qKid').value;
  const subject=document.getElementById('qSubject').value;
  const text=document.getElementById('qText').value.trim();
  if(!text){alert('質問内容を入力してください');return;}
  state.questions.unshift({
    id:'q'+Date.now(),
    kid:kid,
    subject:subject,
    text:text,
    date:new Date().toISOString(),
    resolved:false
  });
  saveState();
  document.getElementById('qText').value='';
  renderQuestions();
  alert('質問を保存しました');
}
function filterQ(f,btn){
  state.qFilter=f;
  renderQuestions();
}
function renderQuestions(){
  const list=document.getElementById('qList');
  let qs=state.questions;
  if(state.qFilter==='kotaro')qs=qs.filter(q=>q.kid==='kotaro');
  else if(state.qFilter==='yuna')qs=qs.filter(q=>q.kid==='yuna');
  else if(state.qFilter==='nanami')qs=qs.filter(q=>q.kid==='nanami');
  else if(state.qFilter==='pending')qs=qs.filter(q=>!q.resolved);
  if(qs.length===0){
    list.innerHTML='<div class="empty-msg">質問がありません。「わからないところ」を上のフォームから書いてみよう！</div>';
    return;
  }
  let html='';
  qs.forEach(q=>{
    const date=new Date(q.date);
    const dateStr=`${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())}`;
    html+=`<div class="q-list-item ${q.resolved?'resolved':''}">
      <div class="q-meta">
        <span class="q-tag ${q.kid}">${KID_LABELS[q.kid]}</span>
        <span class="q-tag subject">${escapeHtml(q.subject)}</span>
        ${q.resolved?'<span class="q-resolved-mark">✓ 解決済み</span>':''}
        <span class="q-date">${dateStr}</span>
      </div>
      <div class="q-text">${escapeHtml(q.text)}</div>
      <div class="q-actions">
        <button class="btn ${q.resolved?'btn-secondary':'btn-primary'}" onclick="toggleResolved('${q.id}')">${q.resolved?'未解決に戻す':'解決にする'}</button>
        <button class="btn btn-danger" onclick="deleteQ('${q.id}')">削除</button>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}
function toggleResolved(id){
  const q=state.questions.find(x=>x.id===id);
  if(!q)return;
  q.resolved=!q.resolved;
  saveState();
  renderQuestions();
}
function deleteQ(id){
  if(!confirm('この質問を削除しますか？'))return;
  state.questions=state.questions.filter(q=>q.id!==id);
  saveState();
  renderQuestions();
}

// ============================================================
// Kid info
// ============================================================

  document.getElementById('setKotaroSchool').value=state.kidInfo.kotaro.school;

// ============================================================
// Backup
// ============================================================
function exportData(){
  const data={
    visibleKids:state.visibleKids,
    lessons:state.lessons,
    customEvents:state.customEvents,
    questions:state.questions,
    kidInfo:state.kidInfo,
    exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`takenobi_family_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(!confirm('現在のデータに上書きします。よろしいですか？'))return;
      if(d.visibleKids)state.visibleKids=d.visibleKids;
      if(d.lessons)state.lessons={...state.lessons,...d.lessons};
      if(d.customEvents)state.customEvents=d.customEvents;
      if(d.questions)state.questions=d.questions;
      if(d.kidInfo)state.kidInfo={...state.kidInfo,...d.kidInfo};
      saveState();
      alert('読み込み完了しました');
      location.reload();
    }catch(err){alert('読み込み失敗：'+err.message);}
  };
  reader.readAsText(file);
}
function resetAllData(){
  if(!confirm('すべてのデータ（習い事・予定・質問）を削除します。本当によろしいですか？'))return;
  if(!confirm('もう一度確認します。本当に全部消しますか？'))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

loadState();
KID_LABELS.kotaro=state.kidInfo.kotaro.name;
KID_LABELS.yuna=state.kidInfo.yuna.name;

// Apply visible-kids state to chips
document.querySelectorAll('.kid-chip').forEach(c=>{
  if(c.dataset.kid)c.classList.toggle('off',!state.visibleKids[c.dataset.kid]);

// Set default add-event date to today
const t=new Date();
document.getElementById('addEvDate').value=`${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
renderCalendar();
</script>
